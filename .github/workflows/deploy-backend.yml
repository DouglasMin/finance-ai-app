name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "financeaiapp/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      runtime_arn: ${{ steps.extract.outputs.runtime_arn }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agentcore CLI
        run: npm install -g @aws/agentcore

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Secrets Manager with API keys
        run: |
          aws secretsmanager update-secret \
            --secret-id financial-bot/api-keys \
            --region ${{ env.AWS_REGION }} \
            --secret-string "$(cat <<'SECRET_EOF'
          {
            "OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}",
            "ALPHA_VANTAGE_API_KEY": "${{ secrets.ALPHA_VANTAGE_API_KEY }}",
            "FINNHUB_API_KEY": "${{ secrets.FINNHUB_API_KEY }}",
            "NAVER_CLIENT_ID": "${{ secrets.NAVER_CLIENT_ID }}",
            "NAVER_CLIENT_SECRET": "${{ secrets.NAVER_CLIENT_SECRET }}",
            "LANGSMITH_API_KEY": "${{ secrets.LANGSMITH_API_KEY }}"
          }
          SECRET_EOF
          )"

      - name: Install CDK dependencies (used internally by agentcore deploy)
        working-directory: financeaiapp/agentcore/cdk
        run: npm install

      - name: AgentCore Deploy
        working-directory: financeaiapp
        run: agentcore deploy --yes

      - name: Extract runtime ARN
        id: extract
        run: |
          RUNTIME_ARN=$(aws bedrock-agentcore list-agent-runtimes \
            --region ${{ env.AWS_REGION }} \
            --query "agentRuntimes[?agentRuntimeName=='main' || contains(agentRuntimeName, 'financial') || contains(agentRuntimeName, 'financeai')].agentRuntimeArn" \
            --output text | head -1)
          echo "Extracted runtime ARN: $RUNTIME_ARN"
          echo "runtime_arn=$RUNTIME_ARN" >> $GITHUB_OUTPUT

      - name: Update AGENTCORE_RUNTIME_ARN secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Note: GITHUB_TOKEN cannot write to repository secrets. Set AGENTCORE_RUNTIME_ARN manually from extract step output: ${{ steps.extract.outputs.runtime_arn }}"
