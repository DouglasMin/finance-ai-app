name: deploy-frontend

on:
  push:
    branches: [main]
    paths:
      - "financeaiapp-frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: financeaiapp-frontend-612529367436
  CLOUDFRONT_DISTRIBUTION_ID: ERKSO9H1ZH66F

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch config from SSM
        id: config
        run: |
          RUNTIME_ARN=$(aws ssm get-parameter --name /financeaiapp/agentcore-runtime-arn --region ${{ env.AWS_REGION }} --query Parameter.Value --output text)
          APP_PASSWORD=$(aws ssm get-parameter --name /financeaiapp/app-password --region ${{ env.AWS_REGION }} --with-decryption --query Parameter.Value --output text)
          echo "runtime_arn=$RUNTIME_ARN" >> $GITHUB_OUTPUT
          echo "::add-mask::$APP_PASSWORD"
          echo "app_password=$APP_PASSWORD" >> $GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: financeaiapp-frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: financeaiapp-frontend
        env:
          VITE_APP_PASSWORD: ${{ steps.config.outputs.app_password }}
          VITE_IDENTITY_POOL_ID: ap-northeast-2:971862c3-961b-4247-8368-a0e799870e03
          VITE_AGENTCORE_RUNTIME_ARN: ${{ steps.config.outputs.runtime_arn }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: pnpm build

      - name: Sync to S3
        run: |
          aws s3 sync financeaiapp-frontend/dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp financeaiapp-frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
