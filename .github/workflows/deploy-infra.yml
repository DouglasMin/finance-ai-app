name: deploy-infra

on:
  push:
    branches: [main]
    paths:
      - "financeaiapp-infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:
    inputs:
      deploy_briefing:
        description: "Deploy FinanceaiappBriefing stack"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CDK_DEFAULT_ACCOUNT: "612529367436"
  CDK_DEFAULT_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      identity_pool_id: ${{ steps.cognito.outputs.identity_pool_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: financeaiapp-infra
        run: pnpm install --frozen-lockfile

      - name: Install Lambda dependencies
        working-directory: financeaiapp-infra/lambda/briefing-proxy
        run: npm install

      - name: CDK Deploy Cognito
        id: cognito
        working-directory: financeaiapp-infra
        run: |
          npx cdk deploy FinanceaiappCognito --require-approval never --outputs-file outputs.json
          POOL_ID=$(jq -r '.FinanceaiappCognito.IdentityPoolIdOutput' outputs.json)
          echo "identity_pool_id=$POOL_ID" >> $GITHUB_OUTPUT
          echo "Cognito Identity Pool: $POOL_ID"

      - name: CDK Deploy Alarms
        working-directory: financeaiapp-infra
        run: npx cdk deploy FinanceaiappAlarms --require-approval never

      - name: CDK Deploy Briefing (requires runtime ARN)
        if: ${{ secrets.AGENTCORE_RUNTIME_ARN != '' && (github.event.inputs.deploy_briefing != 'false') }}
        working-directory: financeaiapp-infra
        env:
          AGENTCORE_RUNTIME_ARN: ${{ secrets.AGENTCORE_RUNTIME_ARN }}
        run: npx cdk deploy FinanceaiappBriefing --require-approval never
